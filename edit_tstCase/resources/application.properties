server.port=8095
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.datasource.url=jdbc:h2:file:./data/testmanagement;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.h2.console.enabled=true
test.execution.upstream.base-url=http://localhost:8000
test.execution.mock.execute-response-enabled=true
test.execution.mock.status-response-enabled=true
test.execution.mock.status-delay-ms=0
test.execution.mock.status-sequence=pending,running,completed
squash.api.base-url=https://squash-wmpc.ubs.net/squash/api/rest/latest
squash.api.test-cases-url=https://squash-wmpc.ubs.net/squash/api/rest/test-cases
squash.api.token=
chatbot.provider.strategy=local-simulator
chatbot.provider.name=local-simulator
chatbot.provider.openai.enabled=false
spring.ai.openai.api-key=${OPENAI_API_KEY:disabled-key}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.enabled=false
