spring.datasource.url=jdbc:sqlite:./data/testmanagement.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-sqlite.sql
spring.sql.init.data-locations=classpath:data-sqlite.sql
spring.h2.console.enabled=false